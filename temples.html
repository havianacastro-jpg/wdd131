            <figure class="temple-card" data-year="2001" data-size="large">

            <figure class="temple-card" data-year="2000" data-size="small">
                <img src="images/tijuana.jpeg" alt="Tijuana Temple" width="400" height="250" loading="lazy">

            </figure>
            <figure class="temple-card" data-year="2000" data-size="small">
                <img src="images/oaxaca.jpeg" alt="Oaxaca Temple" width="400" height="250" loading="lazy">
